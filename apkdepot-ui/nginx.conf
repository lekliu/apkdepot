server {
    listen 80;
    server_name localhost;

    # 设置允许的客户端请求体的最大值为 500MB
    client_max_body_size 500M;

    # 托管 Vue App 的静态文件
    location / {
        root   /usr/share/nginx/html;
        index  index.html;
        try_files $uri $uri/ /index.html;
    }

    # 将所有 /api 的请求反向代理到后端 Go API 服务
    # "api" 是下面 docker-compose.yml 中定义的服务名
    location /api/ {
        proxy_pass http://api:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ---------------------------------------------------------------------------------
    # 【终极修复】：由 Nginx 边缘端直通分发 APK 静态文件（避开 Go 代理，杜绝标头冲突）
    # ---------------------------------------------------------------------------------
    location /apks/ {
        # 1. 指向挂载的物理 APK 存放目录
        root /usr/share/nginx/html;

        # 2. 强制锁定单个 APK 文件的 MIME 类型
        types {
            application/vnd.android.package-archive apk;
        }
        default_type application/vnd.android.package-archive;

        # 3. 注入强下载与禁止内容嗅探标头（彻底击碎 Chromium 移动端嗅探机制）
        add_header Content-Disposition "attachment";
        add_header X-Content-Type-Options "nosniff";

        # 4. 禁用 Gzip 压缩，保护 APK 原生二进制流不被损坏
        gzip off;

        # 5. 强效禁用响应缓存，迫使手机浏览器每次下载都索要最新的 Header
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
        add_header Pragma "no-cache";
        add_header Expires 0;
    }
}